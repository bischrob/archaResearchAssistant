services:
  marker:
    image: xiaoyao9184/marker:latest
    container_name: marker-ai
    ports:
      - "8080:7860" # Web UI access
    volumes:
      - C:/Users/rjbischo/ASU Dropbox/Robert Bischoff/Projects/researchAssistant/pdf2epub/input:/app/input
      - C:/Users/rjbischo/ASU Dropbox/Robert Bischoff/Projects/researchAssistant/pdf2epub/output:/app/output
      - marker_cache:/root/.cache # Important: Persist ML models (2-4GB)
    environment:
      - TORCH_DEVICE=cuda
      - OCR_ENGINE=surya
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  marker_cache: